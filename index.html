<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注音抽籤機 — 團康遊戲工具</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f5c842;
      --gold-dim: rgba(245,200,66,0.6);
      --gold-bg: rgba(245,200,66,0.12);
      --gold-border: rgba(245,200,66,0.35);
      --blue: #64a8e8;
      --blue-bg: rgba(100,168,232,0.12);
      --blue-border: rgba(100,168,232,0.4);
      --green: #4dc9a0;
      --green-bg: rgba(77,201,160,0.12);
      --green-border: rgba(77,201,160,0.4);
      --purple: #a78bfa;
      --purple-bg: rgba(167,139,250,0.12);
      --purple-border: rgba(167,139,250,0.4);
      --bg1: #1a0a2e;
      --bg2: #16213e;
      --bg3: #0f3460;
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.1);
      --text: #f0f0f0;
      --text-dim: rgba(240,240,240,0.5);
      --text-hint: rgba(240,240,240,0.28);
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
      font-family: 'Noto Serif TC', serif;
      color: var(--text);
      padding: 0 0 60px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 36px 20px 24px;
    }
    .header-sub {
      font-size: 12px;
      letter-spacing: 6px;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 8px;
    }
    .header h1 {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #fff;
    }
    .header-line {
      width: 56px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 12px auto 0;
    }

    /* ── Tabs ── */
    .tabs-bar {
      display: flex;
      max-width: 600px;
      margin: 0 auto 24px;
      border-bottom: 1px solid var(--card-border);
      padding: 0 20px;
    }
    .tab-btn {
      flex: 1; padding: 14px 0;
      font-size: 15px; font-weight: 500;
      background: none; border: none; cursor: pointer;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      font-family: 'Noto Serif TC', serif;
      letter-spacing: 2px;
    }
    .tab-btn.active {
      color: var(--gold);
      border-bottom: 2px solid var(--gold);
    }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Container ── */
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 28px 24px;
      backdrop-filter: blur(10px);
      margin-bottom: 16px;
    }

    /* ══════════════════════════════
       頁籤一：隨機抽籤
    ══════════════════════════════ */
    .pool-label {
      font-size: 11px;
      color: var(--text-hint);
      letter-spacing: 4px;
      text-align: center;
      margin-bottom: 10px;
    }
    .pool-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .pc {
      width: 34px; height: 34px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 500;
      border: 1px solid;
      transition: all 0.2s;
      cursor: default;
    }
    .pc.sm {
      color: #7ec8f0;
      background: rgba(126,200,240,0.1);
      border-color: rgba(126,200,240,0.25);
    }
    .pc.ji {
      color: #7be8b8;
      background: rgba(123,232,184,0.1);
      border-color: rgba(123,232,184,0.25);
    }
    .pc.hl {
      transform: scale(1.22);
      box-shadow: 0 0 0 2px rgba(245,200,66,0.6);
      z-index: 1;
    }

    .legend {
      display: flex;
      gap: 18px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-dim);
    }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; }
    .legend-dot.s { background: #7ec8f0; }
    .legend-dot.i { background: #7be8b8; }

    .pair {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .char-box {
      width: 110px; height: 110px;
      border-radius: 18px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; border: 1px solid;
      transition: all 0.15s;
    }
    .char-box.sm-box {
      background: rgba(126,200,240,0.1);
      border-color: rgba(126,200,240,0.4);
      box-shadow: 0 0 20px rgba(126,200,240,0.08);
    }
    .char-box.ji-box {
      background: rgba(123,232,184,0.1);
      border-color: rgba(123,232,184,0.4);
      box-shadow: 0 0 20px rgba(123,232,184,0.08);
    }
    .char-box.spinning {
      background: rgba(255,255,255,0.03) !important;
      border-color: rgba(255,255,255,0.1) !important;
      box-shadow: none !important;
    }
    .char-main { font-size: 52px; line-height: 1; font-weight: 700; }
    .char-box.sm-box .char-main { color: #7ec8f0; }
    .char-box.ji-box .char-main { color: #7be8b8; }
    .char-box.spinning .char-main { color: var(--text-hint) !important; }
    .char-tag {
      font-size: 11px; padding: 2px 10px; border-radius: 8px;
    }
    .char-box.sm-box .char-tag { color: #7ec8f0; background: rgba(126,200,240,0.15); }
    .char-box.ji-box .char-tag { color: #7be8b8; background: rgba(123,232,184,0.15); }
    .char-box.spinning .char-tag { color: transparent !important; background: transparent !important; }

    @keyframes pop {
      0%   { transform: scale(0.8); }
      55%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .pop { animation: pop 0.32s cubic-bezier(.36,.07,.19,.97); }

    .hint-text {
      text-align: center;
      font-size: 12px;
      color: var(--text-hint);
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .history-section { margin-top: 20px; text-align: center; }
    .history-label {
      font-size: 11px; color: var(--text-hint);
      letter-spacing: 4px; margin-bottom: 10px;
    }
    .history-chips {
      display: flex; gap: 8px;
      flex-wrap: wrap; justify-content: center;
    }
    .hist-chip {
      font-size: 16px; letter-spacing: 4px;
      padding: 4px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      color: var(--text-dim);
    }

    /* ══════════════════════════════
       頁籤二：主題遊戲
    ══════════════════════════════ */
    .section-label {
      font-size: 11px; color: var(--text-hint);
      letter-spacing: 3px; margin-bottom: 10px;
    }
    .theme-chips-wrap {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-bottom: 20px;
    }
    .theme-chip {
      padding: 6px 13px; border-radius: 20px;
      font-size: 12px; cursor: pointer;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.04);
      color: var(--text-dim);
      font-family: 'Noto Serif TC', serif;
      transition: all 0.18s;
      letter-spacing: 0.5px;
    }
    .theme-chip.on {
      background: var(--purple-bg);
      border-color: var(--purple-border);
      color: var(--purple);
    }
    .theme-chip:hover { color: var(--text); }

    .game-top {
      display: flex; gap: 14px;
      margin-bottom: 20px;
    }
    .theme-display {
      flex: 1;
      background: var(--purple-bg);
      border: 1px solid var(--purple-border);
      border-radius: 14px; padding: 16px 14px;
      text-align: center; transition: opacity 0.2s;
    }
    .theme-display-label {
      font-size: 11px; color: var(--purple);
      letter-spacing: 3px; margin-bottom: 8px; opacity: 0.8;
    }
    .theme-display-val {
      font-size: 21px; font-weight: 700;
      color: #d4bbff; letter-spacing: 1px;
    }
    .zhuyin-display {
      width: 100px;
      background: var(--blue-bg);
      border: 1px solid var(--blue-border);
      border-radius: 14px; padding: 14px 10px;
      text-align: center; transition: opacity 0.2s;
    }
    .zhuyin-display-label {
      font-size: 11px; color: var(--blue);
      letter-spacing: 3px; margin-bottom: 4px; opacity: 0.8;
    }
    .zhuyin-display-val {
      font-size: 42px; font-weight: 700;
      color: #90caff; line-height: 1.1;
    }
    .zhuyin-display-tag {
      font-size: 11px; color: var(--blue); margin-top: 3px; opacity: 0.7;
    }
    .dim { opacity: 0.35; }

    .examples-label {
      font-size: 11px; color: var(--text-hint);
      letter-spacing: 2px; margin-bottom: 10px;
    }
    .examples-list { display: flex; flex-direction: column; gap: 9px; }
    .ex-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
    }
    .ex-zhuyin {
      font-size: 22px; font-weight: 700;
      color: #90caff; width: 28px; flex-shrink: 0;
    }
    .ex-body { flex: 1; }
    .ex-answer {
      font-size: 15px; color: var(--text);
      transition: all 0.25s; font-weight: 500;
    }
    .ex-answer.hidden {
      background: rgba(255,255,255,0.1);
      color: transparent; border-radius: 5px;
      cursor: pointer; user-select: none;
      min-width: 70px; display: inline-block;
    }
    .ex-hint { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
    .reveal-btn {
      font-size: 11px; padding: 4px 11px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: none; cursor: pointer;
      color: var(--text-dim);
      font-family: 'Noto Serif TC', serif;
      transition: all 0.18s; white-space: nowrap;
    }
    .reveal-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    .empty-state {
      text-align: center;
      color: var(--text-hint);
      font-size: 13px;
      padding: 28px 0;
      letter-spacing: 1px;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex; gap: 10px; justify-content: center;
      margin-top: 4px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #e8a500);
      border: none; border-radius: 50px;
      padding: 13px 44px; font-size: 17px; font-weight: 700;
      color: #1a0a2e; cursor: pointer;
      letter-spacing: 4px;
      font-family: 'Noto Serif TC', serif;
      box-shadow: 0 4px 20px rgba(245,200,66,0.3);
      transition: all 0.2s;
    }
    .btn-primary:hover:not(:disabled) {
      transform: scale(1.04);
      box-shadow: 0 6px 28px rgba(245,200,66,0.45);
    }
    .btn-primary:disabled {
      background: rgba(245,200,66,0.25);
      color: rgba(255,255,255,0.35);
      cursor: not-allowed; transform: none; box-shadow: none;
    }
    .btn-secondary {
      background: rgba(126,200,240,0.1);
      border: 1px solid rgba(126,200,240,0.35);
      border-radius: 50px;
      padding: 13px 24px; font-size: 14px;
      color: #7ec8f0; cursor: pointer;
      font-family: 'Noto Serif TC', serif;
      transition: all 0.2s;
    }
    .btn-secondary:hover { background: rgba(126,200,240,0.2); }

    /* ── Decorative circles ── */
    .deco {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
    }
    .deco1 { top: -80px; left: -80px; width: 280px; height: 280px; border: 1.5px solid rgba(255,200,50,0.07); }
    .deco2 { bottom: -60px; right: -60px; width: 220px; height: 220px; border: 1.5px solid rgba(255,200,50,0.1); }
    .deco3 { top: 35%; right: -5%; width: 130px; height: 130px; border: 1px solid rgba(255,200,50,0.05); }

    /* ── Responsive ── */
    @media (max-width: 420px) {
      .header h1 { font-size: 24px; }
      .char-box { width: 96px; height: 96px; }
      .char-main { font-size: 44px; }
      .theme-display-val { font-size: 17px; }
      .zhuyin-display { width: 86px; }
      .zhuyin-display-val { font-size: 36px; }
      .card { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <div class="deco deco1"></div>
  <div class="deco deco2"></div>
  <div class="deco deco3"></div>

  <div class="header">
    <div class="header-sub">團康遊戲工具</div>
    <h1>注音抽籤機</h1>
    <div class="header-line"></div>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('draw')">隨機抽籤</button>
    <button class="tab-btn" onclick="switchTab('game')">主題遊戲</button>
  </div>

  <!-- ════════ 頁籤一：隨機抽籤 ════════ -->
  <div id="tab-draw" class="tab-content active">
    <div class="container">
      <div class="card">
        <div class="pool-label">抽取池（聲母 21 + 介音 3，共 24 個）</div>
        <div class="pool-grid" id="poolGrid"></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot s"></div>聲母（21）</div>
          <div class="legend-item"><div class="legend-dot i"></div>介音（3）</div>
        </div>

        <div class="pair">
          <div class="char-box sm-box" id="dbox1">
            <div class="char-main" id="dchar1">ㄅ</div>
            <div class="char-tag" id="dtag1">聲母</div>
          </div>
          <div class="char-box sm-box" id="dbox2">
            <div class="char-main" id="dchar2">ㄆ</div>
            <div class="char-tag" id="dtag2">聲母</div>
          </div>
        </div>

        <div class="hint-text" id="dhint">點擊按鈕抽取注音字首</div>
        <div class="btn-row">
          <button class="btn-primary" id="drawBtn" onclick="doDraw()">🎲 抽　籤</button>
        </div>
      </div>

      <div id="drawHistorySection" style="display:none">
        <div class="card">
          <div class="history-label">歷史紀錄</div>
          <div class="history-chips" id="drawHistory"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════ 頁籤二：主題遊戲 ════════ -->
  <div id="tab-game" class="tab-content">
    <div class="container">

      <div class="card">
        <div class="section-label">選擇主題範圍（可多選）</div>
        <div class="theme-chips-wrap" id="themeChips"></div>
      </div>

      <div class="card">
        <div class="game-top">
          <div class="theme-display dim" id="themeDisplay">
            <div class="theme-display-label">主　題</div>
            <div class="theme-display-val" id="themeVal">—</div>
          </div>
          <div class="zhuyin-display dim" id="zhuyinDisplay">
            <div class="zhuyin-display-label">字　首</div>
            <div class="zhuyin-display-val" id="zhuyinVal">—</div>
            <div class="zhuyin-display-tag" id="zhuyinTag"></div>
          </div>
        </div>

        <div class="examples-label">範例提示（點答案欄揭曉）</div>
        <div class="examples-list" id="examplesGrid">
          <div class="empty-state">選好主題後點「出題」開始遊戲</div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-primary" id="gameBtn" onclick="doGame()">🎯 出　題</button>
        <button class="btn-secondary" id="revealAllBtn" onclick="revealAll()" style="display:none">全部揭曉</button>
      </div>

    </div>
  </div>

  <script>
    /* ════════════════════════════════
       注音符號池（聲母21 + 介音3）
    ════════════════════════════════ */
    const POOL = [
      {c:'ㄅ',t:'聲母',k:'sm'},{c:'ㄆ',t:'聲母',k:'sm'},{c:'ㄇ',t:'聲母',k:'sm'},{c:'ㄈ',t:'聲母',k:'sm'},
      {c:'ㄉ',t:'聲母',k:'sm'},{c:'ㄊ',t:'聲母',k:'sm'},{c:'ㄋ',t:'聲母',k:'sm'},{c:'ㄌ',t:'聲母',k:'sm'},
      {c:'ㄍ',t:'聲母',k:'sm'},{c:'ㄎ',t:'聲母',k:'sm'},{c:'ㄏ',t:'聲母',k:'sm'},
      {c:'ㄐ',t:'聲母',k:'sm'},{c:'ㄑ',t:'聲母',k:'sm'},{c:'ㄒ',t:'聲母',k:'sm'},
      {c:'ㄓ',t:'聲母',k:'sm'},{c:'ㄔ',t:'聲母',k:'sm'},{c:'ㄕ',t:'聲母',k:'sm'},{c:'ㄖ',t:'聲母',k:'sm'},
      {c:'ㄗ',t:'聲母',k:'sm'},{c:'ㄘ',t:'聲母',k:'sm'},{c:'ㄙ',t:'聲母',k:'sm'},
      {c:'ㄧ',t:'介音',k:'ji'},{c:'ㄨ',t:'介音',k:'ji'},{c:'ㄩ',t:'介音',k:'ji'}
    ];

    /* ════════════════════════════════
       主題資料庫
    ════════════════════════════════ */

        'ㄓ':['炸雞(熱食區)','珍珠奶茶(飲料機)'],
        'ㄔ':['橙汁(果汁飲料)','草莓蛋糕(蛋糕區)'],
        'ㄕ':['薯條(炸物熱食)','沙拉(輕食冷藏)'],

        'ㄨ':['烏龍茶(茶飲暢銷)','午餐肉(罐頭食品)'],
        'ㄩ':['魚板(關東煮料)','玉米(關東煮蔬菜)']
      }},
      '食物': { icon:'🍜', data:{
        'ㄅ':['白飯(主食基本款)','冰淇淋(甜點代表)'],
        'ㄆ':['排骨(台式家常料理)','披薩(義式速食)'],
        'ㄇ':['麻婆豆腐(川菜名菜)','麵包(西式主食)'],
        'ㄈ':['火鍋(冬天必吃)','法國麵包(西式主食)'],

    const ALL_KEYS = Object.keys(THEMES);
    let selectedThemes = new Set(ALL_KEYS);
    let gameSpinning = false;
    let drawHistory = [], drawSpinning = false;

    /* ════ 頁籤切換 ════ */
    function switchTab(t) {
      document.querySelectorAll('.tab-btn').forEach((b, i) =>
        b.classList.toggle('active', (i === 0 && t === 'draw') || (i === 1 && t === 'game'))
      );
      document.getElementById('tab-draw').classList.toggle('active', t === 'draw');
      document.getElementById('tab-game').classList.toggle('active', t === 'game');
    }

    /* ════ 注音池渲染 ════ */
    function renderPool(hls) {
      document.getElementById('poolGrid').innerHTML = POOL.map(p =>
        `<div class="pc ${p.k}${hls && hls.includes(p.c) ? ' hl' : ''}" title="${p.t}">${p.c}</div>`
      ).join('');
    }

    /* ════ 頁籤一：抽籤 ════ */
    function pickOne() { return POOL[Math.floor(Math.random() * POOL.length)]; }

    function doDraw() {
      if (drawSpinning) return;
      drawSpinning = true;
      const btn = document.getElementById('drawBtn');
      const b1 = document.getElementById('dbox1'), b2 = document.getElementById('dbox2');
      b1.classList.add('spinning'); b2.classList.add('spinning');
      btn.disabled = true;
      document.getElementById('dhint').textContent = '抽取中...';
      renderPool(null);

      let n = 0;
      const iv = setInterval(() => {
        const a = pickOne(), b = pickOne();
        document.getElementById('dchar1').textContent = a.c;
        document.getElementById('dchar2').textContent = b.c;
        n++;
        if (n > 16) {
          clearInterval(iv);
          const fa = pickOne(), fb = pickOne();
          b1.className = 'char-box ' + fa.k + '-box';
          b2.className = 'char-box ' + fb.k + '-box';
          document.getElementById('dchar1').textContent = fa.c;
          document.getElementById('dtag1').textContent = fa.t;
          document.getElementById('dchar2').textContent = fb.c;
          document.getElementById('dtag2').textContent = fb.t;
          void b1.offsetWidth; void b2.offsetWidth;
          b1.classList.add('pop'); b2.classList.add('pop');
          setTimeout(() => { b1.classList.remove('pop'); b2.classList.remove('pop'); }, 400);
          renderPool([fa.c, fb.c]);
          btn.disabled = false;
          document.getElementById('dhint').textContent = '點擊按鈕抽取注音字首';
          drawSpinning = false;
          drawHistory.unshift(fa.c + ' ' + fb.c);
          if (drawHistory.length > 8) drawHistory.pop();
          document.getElementById('drawHistorySection').style.display = '';
          document.getElementById('drawHistory').innerHTML =
            drawHistory.map(h => `<div class="hist-chip">${h}</div>`).join('');
        }
      }, 55);
    }

    /* ════ 頁籤二：主題遊戲 ════ */
    function renderThemeChips() {
      document.getElementById('themeChips').innerHTML = ALL_KEYS.map(k =>
        `<button class="theme-chip${selectedThemes.has(k) ? ' on' : ''}" onclick="toggleTheme('${k}')">${THEMES[k].icon} ${k}</button>`
      ).join('');
    }

    function toggleTheme(k) {
      if (selectedThemes.has(k)) {
        if (selectedThemes.size > 1) selectedThemes.delete(k);
      } else {
        selectedThemes.add(k);
      }
      renderThemeChips();
    }

    function doGame() {
      if (gameSpinning) return;
      const pool = [...selectedThemes];
      if (!pool.length) return;
      gameSpinning = true;
      document.getElementById('gameBtn').disabled = true;
      document.getElementById('revealAllBtn').style.display = 'none';
      document.getElementById('themeDisplay').classList.add('dim');
      document.getElementById('zhuyinDisplay').classList.add('dim');
      document.getElementById('examplesGrid').innerHTML = '<div class="empty-state">出題中...</div>';

      let n = 0;
      const iv = setInterval(() => {
        const rt = pool[Math.floor(Math.random() * pool.length)];
        const rp = POOL[Math.floor(Math.random() * POOL.length)];
        document.getElementById('themeVal').textContent = THEMES[rt].icon + ' ' + rt;
        document.getElementById('zhuyinVal').textContent = rp.c;
        document.getElementById('zhuyinTag').textContent = rp.t;
        n++;
        if (n > 18) {
          clearInterval(iv);
          const theme = pool[Math.floor(Math.random() * pool.length)];
          const themeData = THEMES[theme].data;
          const availKeys = Object.keys(themeData);
          const zKey = availKeys[Math.floor(Math.random() * availKeys.length)];
          const zInfo = POOL.find(p => p.c === zKey) || { c: zKey, t: '聲母', k: 'sm' };

          document.getElementById('themeVal').textContent = THEMES[theme].icon + ' ' + theme;
          document.getElementById('zhuyinVal').textContent = zInfo.c;
          document.getElementById('zhuyinTag').textContent = zInfo.t;
          document.getElementById('themeDisplay').classList.remove('dim');
          document.getElementById('zhuyinDisplay').classList.remove('dim');

          const examples = themeData[zKey];
          document.getElementById('examplesGrid').innerHTML = examples.map((ex, i) => {
            const m = ex.match(/^(.+?)\((.+)\)$/) || [ex, ex, ''];
            return `<div class="ex-row">
              <div class="ex-zhuyin">${zInfo.c}</div>
              <div class="ex-body">
                <div class="ex-answer hidden" id="ea${i}" onclick="revealOne(${i})">${m[1]}</div>
                <div class="ex-hint">${m[2]}</div>
              </div>
              <button class="reveal-btn" id="rb${i}" onclick="revealOne(${i})">揭曉</button>
            </div>`;
          }).join('');

          document.getElementById('gameBtn').disabled = false;
          document.getElementById('revealAllBtn').style.display = '';
          gameSpinning = false;
        }
      }, 60);
    }

    function revealOne(i) {
      const el = document.getElementById('ea' + i);
      const rb = document.getElementById('rb' + i);
      if (el) el.classList.remove('hidden');
      if (rb) rb.style.display = 'none';
    }

    function revealAll() {
      document.querySelectorAll('.ex-answer.hidden').forEach(el => el.classList.remove('hidden'));
      document.querySelectorAll('.reveal-btn').forEach(b => b.style.display = 'none');
    }

    /* ════ 初始化 ════ */
    renderPool(null);
    renderThemeChips();
  </script>
