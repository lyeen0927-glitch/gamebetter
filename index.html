<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注音抽籤機 — 團康遊戲工具</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #f5c842;
      --purple: #a78bfa;
      --purple-bg: rgba(167,139,250,0.12);
      --purple-border: rgba(167,139,250,0.4);
      --bg1: #1a0a2e; --bg2: #16213e; --bg3: #0f3460;
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.1);
      --text: #f0f0f0;
      --text-dim: rgba(240,240,240,0.5);
      --text-hint: rgba(240,240,240,0.28);
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
      font-family: 'Noto Serif TC', serif;
      color: var(--text);
      padding: 0 0 60px;
    }
    .header { text-align: center; padding: 36px 20px 24px; }
    .header-sub { font-size: 12px; letter-spacing: 6px; color: var(--gold); opacity: 0.7; margin-bottom: 8px; }
    .header h1 { font-size: 30px; font-weight: 700; letter-spacing: 4px; color: #fff; }
    .header-line { width: 56px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 12px auto 0; }

    .tabs-bar { display: flex; max-width: 600px; margin: 0 auto 24px; border-bottom: 1px solid var(--card-border); padding: 0 20px; }
    .tab-btn { flex: 1; padding: 14px 0; font-size: 15px; font-weight: 500; background: none; border: none; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; transition: all 0.2s; font-family: 'Noto Serif TC', serif; letter-spacing: 2px; }
    .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .container { max-width: 560px; margin: 0 auto; padding: 0 20px; }
    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 28px 24px; backdrop-filter: blur(10px); margin-bottom: 16px; }

    /* 頁籤一 */
    .pool-label { font-size: 11px; color: var(--text-hint); letter-spacing: 4px; text-align: center; margin-bottom: 10px; }
    .pool-grid { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
    .pc { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; border: 1px solid; transition: all 0.2s; }
    .pc.sm { color: #7ec8f0; background: rgba(126,200,240,0.1); border-color: rgba(126,200,240,0.25); }
    .pc.ji { color: #7be8b8; background: rgba(123,232,184,0.1); border-color: rgba(123,232,184,0.25); }
    .pc.hl { transform: scale(1.22); box-shadow: 0 0 0 2px rgba(245,200,66,0.6); z-index: 1; }
    .legend { display: flex; gap: 18px; justify-content: center; margin-bottom: 24px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; }
    .legend-dot.s { background: #7ec8f0; }
    .legend-dot.i { background: #7be8b8; }
    .pair { display: flex; gap: 20px; justify-content: center; margin-bottom: 16px; }
    .char-box { width: 110px; height: 110px; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; border: 1px solid; transition: all 0.15s; }
    .char-box.sm-box { background: rgba(126,200,240,0.1); border-color: rgba(126,200,240,0.4); }
    .char-box.ji-box { background: rgba(123,232,184,0.1); border-color: rgba(123,232,184,0.4); }
    .char-box.spinning { background: rgba(255,255,255,0.03) !important; border-color: rgba(255,255,255,0.1) !important; }
    .char-main { font-size: 52px; line-height: 1; font-weight: 700; }
    .char-box.sm-box .char-main { color: #7ec8f0; }
    .char-box.ji-box .char-main { color: #7be8b8; }
    .char-box.spinning .char-main { color: var(--text-hint) !important; }
    .char-tag { font-size: 11px; padding: 2px 10px; border-radius: 8px; }
    .char-box.sm-box .char-tag { color: #7ec8f0; background: rgba(126,200,240,0.15); }
    .char-box.ji-box .char-tag { color: #7be8b8; background: rgba(123,232,184,0.15); }
    .char-box.spinning .char-tag { color: transparent !important; background: transparent !important; }
    @keyframes pop { 0%{transform:scale(0.8)} 55%{transform:scale(1.1)} 100%{transform:scale(1)} }
    .pop { animation: pop 0.32s ease; }
    .hint-text { text-align: center; font-size: 12px; color: var(--text-hint); letter-spacing: 2px; margin-bottom: 20px; }
    .history-label { font-size: 11px; color: var(--text-hint); letter-spacing: 4px; margin-bottom: 10px; }
    .history-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .hist-chip { font-size: 16px; letter-spacing: 4px; padding: 4px 14px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: var(--text-dim); }

    /* 頁籤二 */
    .section-label { font-size: 11px; color: var(--text-hint); letter-spacing: 3px; margin-bottom: 10px; }
    .theme-toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .toolbar-btn { padding: 5px 14px; border-radius: 16px; font-size: 12px; cursor: pointer; font-family: 'Noto Serif TC', serif; border: 1px solid; transition: all 0.18s; letter-spacing: 1px; }
    .btn-select-all { border-color: rgba(123,232,184,0.4); color: #7be8b8; background: rgba(123,232,184,0.08); }
    .btn-select-all:hover { background: rgba(123,232,184,0.18); }
    .btn-clear-all { border-color: rgba(255,100,100,0.4); color: #ff8888; background: rgba(255,100,100,0.08); }
    .btn-clear-all:hover { background: rgba(255,100,100,0.18); }
    .btn-add-theme { border-color: rgba(245,200,66,0.4); color: var(--gold); background: rgba(245,200,66,0.08); }
    .btn-add-theme:hover { background: rgba(245,200,66,0.18); }
    .theme-chips-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
    .theme-chip { display: flex; align-items: center; gap: 4px; padding: 5px 10px 5px 13px; border-radius: 20px; font-size: 12px; border: 1px solid var(--card-border); background: rgba(255,255,255,0.04); color: var(--text-dim); transition: all 0.18s; }
    .theme-chip.on { background: var(--purple-bg); border-color: var(--purple-border); color: var(--purple); }
    .theme-chip.custom.on { background: rgba(245,200,66,0.1); border-color: rgba(245,200,66,0.4); color: var(--gold); }
    .theme-chip span:first-child { cursor: pointer; }
    .del-btn { cursor: pointer; font-size: 10px; opacity: 0.45; padding: 1px 2px; border-radius: 4px; transition: all 0.15s; }
    .del-btn:hover { opacity: 1; background: rgba(255,80,80,0.25); color: #ff8888; }
    .theme-count { font-size: 11px; color: var(--text-hint); letter-spacing: 2px; text-align: right; }

    /* 遊戲結果 */
    .game-top { display: flex; gap: 14px; }
    .theme-display { flex: 1; background: var(--purple-bg); border: 1px solid var(--purple-border); border-radius: 14px; padding: 16px 14px; text-align: center; }
    .theme-display-label { font-size: 11px; color: var(--purple); letter-spacing: 3px; margin-bottom: 8px; opacity: 0.8; }
    .theme-display-val { font-size: 21px; font-weight: 700; color: #d4bbff; letter-spacing: 1px; }
    .zhuyin-display { width: 100px; background: rgba(126,200,240,0.1); border: 1px solid rgba(126,200,240,0.4); border-radius: 14px; padding: 14px 10px; text-align: center; }
    .zhuyin-display-label { font-size: 11px; color: #7ec8f0; letter-spacing: 3px; margin-bottom: 4px; opacity: 0.8; }
    .zhuyin-display-val { font-size: 42px; font-weight: 700; color: #90caff; line-height: 1.1; }
    .zhuyin-display-tag { font-size: 11px; color: #7ec8f0; margin-top: 3px; opacity: 0.7; }
    .dim { opacity: 0.35; transition: opacity 0.2s; }

    /* 按鈕 */
    .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 4px; }
    .btn-primary { background: linear-gradient(135deg, var(--gold), #e8a500); border: none; border-radius: 50px; padding: 13px 44px; font-size: 17px; font-weight: 700; color: #1a0a2e; cursor: pointer; letter-spacing: 4px; font-family: 'Noto Serif TC', serif; box-shadow: 0 4px 20px rgba(245,200,66,0.3); transition: all 0.2s; }
    .btn-primary:hover:not(:disabled) { transform: scale(1.04); box-shadow: 0 6px 28px rgba(245,200,66,0.45); }
    .btn-primary:disabled { background: rgba(245,200,66,0.25); color: rgba(255,255,255,0.35); cursor: not-allowed; transform: none; box-shadow: none; }

    /* 新增主題彈窗 */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.hidden { display: none; }
    .modal { background: #1e1040; border: 1px solid rgba(167,139,250,0.4); border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 400px; }
    .modal-title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 2px; margin-bottom: 20px; }
    .modal label { font-size: 12px; color: var(--text-hint); letter-spacing: 2px; display: block; margin-bottom: 6px; }
    .modal input, .modal textarea { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: 'Noto Serif TC', serif; font-size: 14px; outline: none; transition: border 0.2s; margin-bottom: 16px; }
    .modal input:focus, .modal textarea:focus { border-color: var(--purple); }
    .modal-hint { font-size: 11px; color: var(--text-hint); margin-top: -12px; margin-bottom: 16px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-cancel { padding: 9px 22px; border-radius: 16px; border: 1px solid var(--card-border); background: none; color: var(--text-dim); cursor: pointer; font-family: 'Noto Serif TC', serif; font-size: 13px; }
    .modal-confirm { padding: 9px 22px; border-radius: 16px; border: none; background: linear-gradient(135deg, var(--gold), #e8a500); color: #1a0a2e; cursor: pointer; font-family: 'Noto Serif TC', serif; font-size: 13px; font-weight: 700; }

    .deco { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
    .deco1 { top:-80px; left:-80px; width:280px; height:280px; border:1.5px solid rgba(255,200,50,0.07); }
    .deco2 { bottom:-60px; right:-60px; width:220px; height:220px; border:1.5px solid rgba(255,200,50,0.1); }
    @media (max-width: 420px) {
      .header h1 { font-size: 24px; }
      .char-box { width: 96px; height: 96px; }
      .char-main { font-size: 44px; }
      .theme-display-val { font-size: 17px; }
      .zhuyin-display { width: 86px; }
      .zhuyin-display-val { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="deco deco1"></div>
  <div class="deco deco2"></div>
  <div class="header">
    <div class="header-sub">團康遊戲工具</div>
    <h1>注音抽籤機</h1>
    <div class="header-line"></div>
  </div>
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('draw')">隨機抽籤</button>
    <button class="tab-btn" onclick="switchTab('game')">主題遊戲</button>
  </div>

  <!-- 頁籤一 -->
  <div id="tab-draw" class="tab-content active">
    <div class="container">
      <div class="card">
        <div class="pool-label">抽取池（聲母 21 + 介音 3，共 24 個）</div>
        <div class="pool-grid" id="poolGrid"></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot s"></div>聲母（21）</div>
          <div class="legend-item"><div class="legend-dot i"></div>介音（3）</div>
        </div>
        <div class="pair">
          <div class="char-box sm-box" id="dbox1"><div class="char-main" id="dchar1">ㄅ</div><div class="char-tag" id="dtag1">聲母</div></div>
          <div class="char-box sm-box" id="dbox2"><div class="char-main" id="dchar2">ㄆ</div><div class="char-tag" id="dtag2">聲母</div></div>
        </div>
        <div class="hint-text" id="dhint">點擊按鈕抽取注音字首</div>
        <div class="btn-row"><button class="btn-primary" id="drawBtn" onclick="doDraw()">🎲 抽　籤</button></div>
      </div>
      <div id="drawHistorySection" style="display:none">
        <div class="card">
          <div class="history-label">歷史紀錄</div>
          <div class="history-chips" id="drawHistory"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 頁籤二 -->
  <div id="tab-game" class="tab-content">
    <div class="container">
      <div class="card">
        <div class="section-label">主題選擇</div>
        <div class="theme-toolbar">
          <button class="toolbar-btn btn-select-all" onclick="selectAll()">全選</button>
          <button class="toolbar-btn btn-clear-all" onclick="clearAll()">全部取消</button>
          <button class="toolbar-btn btn-add-theme" onclick="openModal()">＋ 新增主題</button>
        </div>
        <div class="theme-chips-wrap" id="themeChips"></div>
        <div class="theme-count" id="themeCount"></div>
      </div>
      <div class="card">
        <div class="game-top">
          <div class="theme-display dim" id="themeDisplay">
            <div class="theme-display-label">主　題</div>
            <div class="theme-display-val" id="themeVal">—</div>
          </div>
          <div class="zhuyin-display dim" id="zhuyinDisplay">
            <div class="zhuyin-display-label">字　首</div>
            <div class="zhuyin-display-val" id="zhuyinVal">—</div>
            <div class="zhuyin-display-tag" id="zhuyinTag"></div>
          </div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="gameBtn" onclick="doGame()">🎯 出　題</button>
      </div>
    </div>
  </div>

  <!-- 新增主題彈窗 -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">新增自訂主題</div>
      <label>主題名稱</label>
      <input type="text" id="newThemeName" placeholder="例如：電影名稱" maxlength="12">
      <div class="modal-hint">輸入名稱後直接儲存，出題時會隨機抽出注音字首供玩家搶答。</div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">取消</button>
        <button class="modal-confirm" onclick="confirmAddTheme()">確認新增</button>
      </div>
    </div>
  </div>

    var ALL_KEYS = Object.keys(THEMES);
    var selectedThemes = new Set(ALL_KEYS);
    var gameSpinning = false;
    var drawSpinning = false;
    var drawHistory = [];

    function switchTab(t) {
      var btns = document.querySelectorAll('.tab-btn');
      btns[0].classList.toggle('active', t === 'draw');
      btns[1].classList.toggle('active', t === 'game');
      document.getElementById('tab-draw').classList.toggle('active', t === 'draw');
      document.getElementById('tab-game').classList.toggle('active', t === 'game');
    }

    function renderPool(hls) {
      document.getElementById('poolGrid').innerHTML = POOL.map(function(p) {
        var hl = hls && hls.indexOf(p.c) >= 0 ? ' hl' : '';
        return '<div class="pc ' + p.k + hl + '">' + p.c + '</div>';
      }).join('');
    }

    function pickOne() { return POOL[Math.floor(Math.random() * POOL.length)]; }

    function doDraw() {
      if (drawSpinning) return;
      drawSpinning = true;
      var btn = document.getElementById('drawBtn');
      var b1 = document.getElementById('dbox1'), b2 = document.getElementById('dbox2');
      b1.classList.add('spinning'); b2.classList.add('spinning');
      btn.disabled = true;
      document.getElementById('dhint').textContent = '抽取中...';
      renderPool(null);
      var n = 0;
      var iv = setInterval(function() {
        var a = pickOne(), b = pickOne();
        document.getElementById('dchar1').textContent = a.c;
        document.getElementById('dchar2').textContent = b.c;
        n++;
        if (n > 16) {
          clearInterval(iv);
          var fa = pickOne(), fb = pickOne();
          b1.className = 'char-box ' + fa.k + '-box';
          b2.className = 'char-box ' + fb.k + '-box';
          document.getElementById('dchar1').textContent = fa.c;
          document.getElementById('dtag1').textContent = fa.t;
          document.getElementById('dchar2').textContent = fb.c;
          document.getElementById('dtag2').textContent = fb.t;
          b1.classList.add('pop'); b2.classList.add('pop');
          setTimeout(function() { b1.classList.remove('pop'); b2.classList.remove('pop'); }, 400);
          renderPool([fa.c, fb.c]);
          btn.disabled = false;
          document.getElementById('dhint').textContent = '點擊按鈕抽取注音字首';
          drawSpinning = false;
          drawHistory.unshift(fa.c + ' ' + fb.c);
          if (drawHistory.length > 8) drawHistory.pop();
          document.getElementById('drawHistorySection').style.display = '';
          document.getElementById('drawHistory').innerHTML = drawHistory.map(function(h) {
            return '<div class="hist-chip">' + h + '</div>';
          }).join('');
        }
      }, 55);
    }

    function renderThemeChips() {
      var keys = Object.keys(THEMES);
      var sel = 0;
      document.getElementById('themeChips').innerHTML = keys.map(function(k) {
        var on = selectedThemes.has(k);
        if (on) sel++;
        var isCustom = THEMES[k].custom ? ' custom' : '';
        return '<div class="theme-chip' + (on ? ' on' : '') + isCustom + '">'
          + '<span onclick="toggleTheme(\'' + k + '\')">' + THEMES[k].icon + ' ' + k + '</span>'
          + '<span class="del-btn" onclick="deleteTheme(\'' + k + '\')" title="刪除">✕</span>'
          + '</div>';
      }).join('');
      document.getElementById('themeCount').textContent = '已選 ' + sel + ' / ' + keys.length + ' 個主題';
    }

    function toggleTheme(k) {
      if (selectedThemes.has(k)) {
        if (selectedThemes.size > 1) selectedThemes.delete(k);
      } else {
        selectedThemes.add(k);
      }
      renderThemeChips();
    }

    function selectAll() {
      Object.keys(THEMES).forEach(function(k) { selectedThemes.add(k); });
      renderThemeChips();
    }

    function clearAll() {
      selectedThemes.clear();
      renderThemeChips();
    }

    function deleteTheme(k) {
      if (!confirm('確定要刪除主題「' + k + '」嗎？')) return;
      delete THEMES[k];
      selectedThemes.delete(k);
      renderThemeChips();
    }

    function openModal() {
      document.getElementById('newThemeName').value = '';
      document.getElementById('newThemeWords').value = '';
      document.getElementById('modalOverlay').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.add('hidden');
    }

    function confirmAddTheme() {
      var name = document.getElementById('newThemeName').value.trim();
      if (!name) { alert('請輸入主題名稱！'); return; }
      if (THEMES[name]) { alert('已有相同名稱，請換一個！'); return; }
      THEMES[name] = { icon: '🎯', custom: true, data: {} };
      selectedThemes.add(name);
      renderThemeChips();
      closeModal();
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    function doGame() {
      if (gameSpinning) return;
      var pool = Array.from(selectedThemes);
      if (!pool.length) { alert('請先選擇至少一個主題！'); return; }
      gameSpinning = true;
      document.getElementById('gameBtn').disabled = true;
      document.getElementById('themeDisplay').classList.add('dim');
      document.getElementById('zhuyinDisplay').classList.add('dim');
      var n = 0;
      var iv = setInterval(function() {
        var rt = pool[Math.floor(Math.random() * pool.length)];
        var rp = POOL[Math.floor(Math.random() * POOL.length)];
        document.getElementById('themeVal').textContent = THEMES[rt].icon + ' ' + rt;
        document.getElementById('zhuyinVal').textContent = rp.c;
        document.getElementById('zhuyinTag').textContent = rp.t;
        n++;
        if (n > 18) {
          clearInterval(iv);
          var theme = pool[Math.floor(Math.random() * pool.length)];
          var themeData = THEMES[theme].data;
          var availKeys = Object.keys(themeData);
          var zInfo;
          if (availKeys.length > 0) {
            var zKey = availKeys[Math.floor(Math.random() * availKeys.length)];
            zInfo = null;
            for (var i = 0; i < POOL.length; i++) {
              if (POOL[i].c === zKey) { zInfo = POOL[i]; break; }
            }
            if (!zInfo) zInfo = POOL[Math.floor(Math.random() * POOL.length)];
          } else {
            zInfo = POOL[Math.floor(Math.random() * POOL.length)];
          }
          document.getElementById('themeVal').textContent = THEMES[theme].icon + ' ' + theme;
          document.getElementById('zhuyinVal').textContent = zInfo.c;
          document.getElementById('zhuyinTag').textContent = zInfo.t;
          document.getElementById('themeDisplay').classList.remove('dim');
          document.getElementById('zhuyinDisplay').classList.remove('dim');
          gameSpinning = false;
          document.getElementById('gameBtn').disabled = false;
        }
      }, 60);
    }

    renderPool(null);
    renderThemeChips();
  </script>
